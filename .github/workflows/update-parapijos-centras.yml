name: Update Parapijos Centras

on:
  schedule:
    - cron: '0 2 * 1 *'  # Runs daily at 2 AM UTC
  workflow_dispatch:

jobs:
  update-parapijos-centras:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install node-fetch@2

      - name: Fetch GeoJSON from QGIS Cloud
        run: |
          curl -sSf "https://qgiscloud.com/Townames/KL14/?format=geojson" -o data.geojson || true

      - name: Run placename processor
        env:
          LIBRETRANSLATE_URL: https://libretranslate.com/translate
        run: node scripts/process-placenames.js

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pirmas
          if ! git diff --staged --quiet; then
            git commit -m "Update Parapijos centras list (automated)"
            git push
          fi
